name: Bug Report
description: Report a bug in snact
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: input
    id: version
    attributes:
      label: snact version
      description: Output of `snact --version`
      placeholder: "0.7.0"
    validations:
      required: true

  - type: dropdown
    id: command
    attributes:
      label: Command
      description: Which snact command is affected?
      options:
        - snap
        - read
        - click
        - fill
        - type
        - select
        - scroll
        - screenshot
        - wait
        - session
        - record / replay
        - browser
        - mcp
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `snact snap https://...`, it returns 0 elements even though the page has content."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1. `snact browser launch --background`
        2. `snact snap <url>`
        3. ...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Environment
      description: OS, Chrome version, how snact was installed.
      placeholder: |
        - OS: macOS 15.4
        - Chrome: 135.0
        - Installed via: install.sh

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Paste any relevant output. Use `--verbose` for detailed logs.
      render: shell
