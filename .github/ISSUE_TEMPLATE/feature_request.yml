name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
      placeholder: "When using snact with heavy SPAs like YouTube, elements aren't captured because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should snact handle this? Include CLI interface ideas if you have them.
      placeholder: |
        `snact snap --wait-for=networkidle https://youtube.com`
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've thought about.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - snap / read (extraction)
        - click / fill / type (actions)
        - session management
        - record / replay
        - browser management
        - MCP server
        - CLI UX
        - other
    validations:
      required: true
